# ============================================
# xSTIK Game Hub — Netlify Configuration
# Domain: games.xstik.art
# ============================================
# No build step needed — pre-built static files
# ============================================

[build]
  publish = "."

# ------ Game Routing ------
# Each game is a standalone HTML file, NOT a React route.
# These MUST come BEFORE the SPA catch-all.
# Order: most specific first, catch-all last.

[[redirects]]
  from = "/solitaire"
  to = "/solitaire/index.html"
  status = 200

[[redirects]]
  from = "/blackjack"
  to = "/blackjack/index.html"
  status = 200

[[redirects]]
  from = "/texas-holdem"
  to = "/texas-holdem/index.html"
  status = 200

[[redirects]]
  from = "/baccarat"
  to = "/baccarat/index.html"
  status = 200

[[redirects]]
  from = "/video-poker"
  to = "/video-poker/index.html"
  status = 200

[[redirects]]
  from = "/three-card-brag"
  to = "/three-card-brag/index.html"
  status = 200

[[redirects]]
  from = "/spades"
  to = "/spades/index.html"
  status = 200

[[redirects]]
  from = "/casino-war"
  to = "/casino-war/index.html"
  status = 200

[[redirects]]
  from = "/pyramid"
  to = "/pyramid/index.html"
  status = 200

# Landing page catch-all (no React SPA — just serves index.html for root)
# This MUST be LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ------ Security Headers ------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ------ Caching ------
# Game HTML files — short cache (may update)
[[headers]]
  for = "/*/index.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Images — long cache with revalidation
[[headers]]
  for = "/fallback-images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# NFT data — moderate cache
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# SHARED-CORE JS — moderate cache (may update between deploys)
[[headers]]
  for = "/SHARED-CORE/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
